name: Supabase Keep Alive

on:
  schedule:
    # Se ejecuta a las 00:00 cada 3 días
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ping_db:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Ping Supabase Database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Añadimos flags para que sea más robusto:
          # -w: No pedir contraseña (usa la de la URL)
          # sslmode=require: Obligatorio para Supabase
          psql "$DB_URL?sslmode=require" -w -c "SELECT 1;"
