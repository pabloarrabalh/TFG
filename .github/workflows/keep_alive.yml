name: Supabase Keep Alive

on:
  schedule:
    # GitHub Actions interpreta este cron por día del mes; es la aproximación habitual a un intervalo de 6 días.
    - cron: '0 0 */6 * *'
  workflow_dispatch: # Permite ejecutarlo a mano para probar

jobs:
  ping_db:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Resolve Supabase IPv4
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python3 -c 'import os,socket; from urllib.parse import urlparse,unquote; db_url=os.environ["DB_URL"]; parsed=urlparse(db_url); host=parsed.hostname; ipv4=socket.gethostbyname(host); dbname=parsed.path.lstrip("/") or "postgres"; user=unquote(parsed.username or ""); password=unquote(parsed.password or ""); print(f"::add-mask::{db_url}"); print(f"::add-mask::{user}"); print(f"::add-mask::{password}"); env_file=open(os.environ["GITHUB_ENV"],"a",encoding="utf-8"); env_file.write(f"PGHOSTADDR={ipv4}\\n"); env_file.write(f"PGHOST={host}\\n"); env_file.write(f"PGPORT={parsed.port or 5432}\\n"); env_file.write(f"PGDATABASE={dbname}\\n"); env_file.write(f"PGUSER={user}\\n"); env_file.write(f"PGPASSWORD={password}\\n"); env_file.write("PGSSLMODE=require\\n"); env_file.close(); print(f"Resolved {host} -> {ipv4}")'

      - name: Ping Supabase
        run: |
          psql -c "SELECT 1;"
