{% extends 'base.html' %}

{% block title %}LigaMaster - Acceso{% endblock %}

{% block content %}
<div class="min-h-full bg-background-dark flex items-center justify-center p-6">
    <div class="max-w-md w-full space-y-8">
        <!-- Logo y header -->
        <div class="text-center">
            <div class="mx-auto size-20 bg-gradient-to-br from-primary to-blue-500 rounded-2xl flex items-center justify-center mb-6">
                <span class="text-3xl font-black text-black">LM</span>
            </div>
            <h2 class="text-3xl font-black text-white mb-2">Bienvenido a LigaMaster</h2>
            <p class="text-gray-400">Inicia sesión o crea tu cuenta para continuar</p>
        </div>

        <!-- Tabs -->
        <div class="glass-panel rounded-2xl overflow-hidden">
            <div class="flex">
                <button class="flex-1 px-6 py-4 text-center font-bold text-primary bg-primary/10 border-b-2 border-primary transition-colors" id="loginTab">
                    Iniciar Sesión
                </button>
                <button class="flex-1 px-6 py-4 text-center font-bold text-gray-400 hover:text-white transition-colors" id="registerTab">
                    Registrarse
                </button>
            </div>

            <!-- Login Form -->
            <div class="p-6" id="loginForm">
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Email</label>
                        <input type="email" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="tu@email.com" />
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Contraseña</label>
                        <input type="password" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="••••••••" />
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="rounded border-border-dark text-primary bg-surface-dark focus:ring-primary/50 focus:ring-2" />
                            <span class="ml-2 text-sm text-gray-400">Recordarme</span>
                        </label>
                        <a href="#" class="text-sm text-primary hover:text-primary-dark transition-colors">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="w-full px-4 py-3 bg-gradient-to-r from-primary to-primary-dark text-black font-bold rounded-xl hover:from-primary-dark hover:to-primary transition-all shadow-lg hover:shadow-[0_0_20px_rgba(57,255,20,0.3)]">
                        Iniciar Sesión
                    </button>
                </form>
            </div>

            <!-- Register Form (hidden by default) -->
            <div class="p-6 hidden" id="registerForm">
                <form class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Nombre</label>
                            <input type="text" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="Juan" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-300 mb-2">Apellidos</label>
                            <input type="text" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="Pérez" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Email</label>
                        <input type="email" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="tu@email.com" />
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Contraseña</label>
                        <input type="password" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="••••••••" />
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-300 mb-2">Confirmar Contraseña</label>
                        <input type="password" class="w-full px-4 py-3 bg-surface-dark border border-border-dark rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" placeholder="••••••••" />
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" class="rounded border-border-dark text-primary bg-surface-dark focus:ring-primary/50 focus:ring-2" />
                        <label class="ml-2 text-sm text-gray-400">Acepto los <a href="#" class="text-primary hover:text-primary-dark">términos y condiciones</a></label>
                    </div>

                    <button type="submit" class="w-full px-4 py-3 bg-gradient-to-r from-primary to-primary-dark text-black font-bold rounded-xl hover:from-primary-dark hover:to-primary transition-all shadow-lg hover:shadow-[0_0_20px_rgba(57,255,20,0.3)]">
                        Crear Cuenta
                    </button>
                </form>
            </div>
        </div>

        <!-- OAuth options -->
        <div class="text-center">
            <p class="text-sm text-gray-400 mb-4">O continúa con</p>
            <div class="flex gap-4 justify-center">
                <button class="flex items-center gap-2 px-4 py-2 bg-surface-dark border border-border-dark rounded-xl text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="flex items-center gap-2 px-4 py-2 bg-surface-dark border border-border-dark rounded-xl text-white hover:bg-white/5 transition-all">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('loginTab').addEventListener('click', function() {
    // Show login form
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    
    // Update tab styles
    this.classList.add('text-primary', 'bg-primary/10', 'border-b-2', 'border-primary');
    this.classList.remove('text-gray-400');
    
    document.getElementById('registerTab').classList.remove('text-primary', 'bg-primary/10', 'border-b-2', 'border-primary');
    document.getElementById('registerTab').classList.add('text-gray-400');
});

document.getElementById('registerTab').addEventListener('click', function() {
    // Show register form
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
    
    // Update tab styles
    this.classList.add('text-primary', 'bg-primary/10', 'border-b-2', 'border-primary');
    this.classList.remove('text-gray-400');
    
    document.getElementById('loginTab').classList.remove('text-primary', 'bg-primary/10', 'border-b-2', 'border-primary');
    document.getElementById('loginTab').classList.add('text-gray-400');
});
</script>
{% endblock %}
