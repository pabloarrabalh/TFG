# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.azure.yml – Producción en Azure Container Apps
#
# Diferencias respecto al compose local:
#   - Sin servicio 'db': Azure Database for PostgreSQL Flexible Server (externo)
#   - Sin servicio 'opensearch': Aiven Managed OpenSearch (externo) o ACI propio
#   - Los secretos se gestionan desde Azure Key Vault o Container App secrets
#
# Uso para test local simulando Azure:
#   docker compose -f docker-compose.azure.yml --env-file .env.azure up --build
#
# En Azure (despliegue vía az CLI):
#   Ver DEPLOYMENT.md → sección Azure
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Django backend (ASGI / Daphne) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.azure
    environment:
      DB_SSL: "require"
      OPENSEARCH_USE_SSL: "True"
    volumes:
      # En Azure: usar Azure Files mount en lugar de bind local
      - media_data:/app/media
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── React/Vite frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://tu-backend.azurecontainerapps.io
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  media_data:
