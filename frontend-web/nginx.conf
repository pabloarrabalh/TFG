server {
    listen 80;
    server_name _;

    # React SPA – serve index.html for any non-file route
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Django REST API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Evita cache del shell SPA para que siempre cargue los chunks nuevos
    location = /index.html {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # Proxy Django admin
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy Django server-rendered views (non-SPA pages)
    location /equipos/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
    }

    # Django-served static files (con fallback)
    location /static/ {
        # Servir desde el volumen montado en /app/static
        root /app;
        try_files $uri @backend_static;
        # Cachear por 30 días
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Backend fallback para static files
    location @backend_static {
        proxy_pass         http://backend:8000;
    }

    # Django media files
    location /media/ {
        proxy_pass         http://backend:8000;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket proxy (Django Channels / Daphne)
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
