server {
    listen 80;
    server_name _;

    # React SPA – serve index.html for any non-file route
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Django REST API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy Django admin
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy Django server-rendered views (non-SPA pages)
    location /equipos/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
    }

    # Django-served static files
    location /static/ {
        proxy_pass         http://backend:8000;
    }

    # Django media files
    location /media/ {
        proxy_pass         http://backend:8000;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
