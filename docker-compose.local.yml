services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-laliga}
      POSTGRES_USER: ${DB_USER:-laliga_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-laliga_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-laliga_user} -d ${DB_NAME:-laliga}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ── Meilisearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY:-masterKey-local-dev}
      - MEILI_LOG_LEVEL=warn
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app-network

  # ── Redis 7 (cache + channels) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  # ── Django backend (ASGI / Daphne) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-masterKey-local-dev}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - ./static:/app/static:ro
      - ./data:/app/data:ro
      - ./csv:/app/csv:ro
      - ./frontend-web/userprofilefotos:/app/frontend-web/userprofilefotos
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── React/Vite frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./static:/app/static:ro
      - ./media:/app/media:ro
      - ./frontend-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:
  meilisearch_data:
  media_data:
  static_data:

networks:
  app-network:
    driver: bridge

